<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><style>
body{margin:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh}
.canvas{width:800px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}

/* === STYLE A: warm editorial === */
.style-a{background:#f3f0e8}
.style-a .icon-area{position:relative;width:240px;height:240px;margin-bottom:48px}
.style-a .outer-ring{position:absolute;inset:0;border-radius:50%;border:5px solid #2D3436}
.style-a .inner-shine{position:absolute;top:30px;left:50px;width:80px;height:80px;border-radius:50%;border:2.5px solid #8B7E74;border-bottom-color:transparent;border-left-color:transparent;transform:rotate(-30deg)}
.style-a .reflect-dot{position:absolute;width:16px;height:16px;border-radius:50%;background:#C0604C;top:55px;right:55px}
.style-a .mirror-line{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:60px;height:2px;background:#2D3436;border-radius:1px}
.style-a .brand{font-family:"Noto Serif SC","Songti SC",serif;font-size:56px;font-weight:700;color:#2D3436;letter-spacing:.10em}
.style-a .sub{font-family:"PingFang SC",sans-serif;font-size:20px;color:#8B7E74;letter-spacing:.24em;margin-top:8px}

/* === STYLE B: deep ink === */
.style-b{background:#2D3436}
.style-b .icon-area{position:relative;width:220px;height:220px;margin-bottom:48px}
.style-b .outer-ring{position:absolute;inset:0;border-radius:50%;border:4px solid rgba(255,255,255,.25)}
.style-b .inner-shine{position:absolute;top:35px;left:55px;width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,255,255,.18);border-bottom-color:transparent;border-left-color:transparent;transform:rotate(-30deg)}
.style-b .reflect-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:#D4A574;top:52px;right:52px}
.style-b .brand{font-family:"Noto Serif SC","Songti SC",serif;font-size:56px;font-weight:600;color:rgba(255,255,255,.85);letter-spacing:.10em}
.style-b .sub{font-family:"PingFang SC",sans-serif;font-size:20px;color:rgba(255,255,255,.35);letter-spacing:.24em;margin-top:8px}

/* === STYLE C: blue modern === */
.style-c{background:#EFF6FF}
.style-c .icon-area{position:relative;width:240px;height:240px;margin-bottom:48px}
.style-c .outer-ring{position:absolute;inset:0;border-radius:50%;border:5px solid #2563EB}
.style-c .inner-shine{position:absolute;top:28px;left:48px;width:85px;height:85px;border-radius:50%;border:3px solid #60A5FA;border-bottom-color:transparent;border-left-color:transparent;transform:rotate(-30deg)}
.style-c .reflect-dot{position:absolute;width:18px;height:18px;border-radius:50%;background:#F59E0B;top:58px;right:56px}
.style-c .brand{font-family:"Noto Serif SC","Songti SC",serif;font-size:56px;font-weight:700;color:#1E3A5F;letter-spacing:.10em}
.style-c .sub{font-family:"PingFang SC",sans-serif;font-size:20px;color:#64748B;letter-spacing:.24em;margin-top:8px}
</style></head>
<body>

<div class="canvas style-a">
  <div class="icon-area">
    <div class="outer-ring"></div>
    <div class="inner-shine"></div>
    <div class="reflect-dot"></div>
    <div class="mirror-line"></div>
  </div>
  <div class="brand">镜子测试局</div>
  <div class="sub">MIRROR · TEST · DISCOVER</div>
</div>

</body></html>
