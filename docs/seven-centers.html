<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title data-title>心理测试</title>
<style>
:root {
  --primary: #6C5CE7;
  --primary-light: #A29BFE;
  --bg: #F8F9FE;
  --card: #FFFFFF;
  --text: #2D3436;
  --text-light: #636E72;
  --success: #00B894;
  --danger: #FF7675;
  --shadow: 0 4px 24px rgba(108,92,231,0.08);
  --radius: 20px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
}

.container {
  width: 100%;
  max-width: 420px;
  min-height: 600px;
  position: relative;
}

/* ====== COVER PAGE ====== */
.cover {
  background: var(--card);
  border-radius: var(--radius);
  padding: 40px 28px 32px;
  text-align: center;
  box-shadow: var(--shadow);
  animation: fadeIn 0.5s ease;
}

.cover-icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin: 0 auto 24px;
  color: #fff;
}

.cover h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 12px;
  line-height: 1.3;
}

.cover .desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
  margin-bottom: 8px;
}

.cover .meta {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px 0 28px;
  font-size: 12px;
  color: var(--text-light);
}

.cover .meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.btn-start {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 24px rgba(108,92,231,0.3);
}

.btn-start:active {
  transform: scale(0.97);
}

/* ====== QUIZ PAGE ====== */
.quiz {
  display: none;
  animation: fadeIn 0.4s ease;
}

.quiz.active {
  display: block;
}

.progress-wrap {
  background: var(--card);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

.progress-text {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

.progress-bar {
  height: 6px;
  background: #EDE8FD;
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 3px;
  transition: width 0.3s ease;
}

.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px 24px 24px;
  box-shadow: var(--shadow);
}

.question-num {
  font-size: 12px;
  color: var(--primary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}

.question-text {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 24px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 14px 18px;
  background: #F8F9FE;
  border: 2px solid transparent;
  border-radius: 14px;
  font-size: 15px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.option-btn:active {
  transform: scale(0.98);
}

.option-btn.selected {
  border-color: var(--primary);
  background: #EDE8FD;
}

.option-letter {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: #E0DCF7;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: var(--primary);
  flex-shrink: 0;
}

.option-btn.selected .option-letter {
  background: var(--primary);
  color: #fff;
}

.btn-next {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  background: #D5D0F0;
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-next.ready {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  box-shadow: 0 8px 24px rgba(108,92,231,0.3);
}

.btn-next:active {
  transform: scale(0.97);
}

/* ====== RESULT PAGE ====== */
.result {
  display: none;
  animation: fadeIn 0.5s ease;
}

.result.active {
  display: block;
}

.result-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 36px 24px 28px;
  box-shadow: var(--shadow);
  text-align: center;
}

.result-type {
  display: inline-block;
  padding: 6px 20px;
  background: #EDE8FD;
  color: var(--primary);
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 20px;
}

.result h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 20px;
  line-height: 1.4;
}

.result .traits {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 24px;
}

.trait-tag {
  padding: 8px 16px;
  background: #F8F9FE;
  border-radius: 20px;
  font-size: 13px;
  color: var(--text-light);
}

.result .report {
  background: #F8F9FE;
  border-radius: 16px;
  padding: 20px;
  text-align: left;
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 24px;
}

.result .score-bar-wrap {
  text-align: left;
  margin-bottom: 20px;
}

.score-dim {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.score-dim .dim-label {
  width: 56px;
  font-size: 12px;
  color: var(--text-light);
  flex-shrink: 0;
}

.score-dim .dim-bar {
  flex: 1;
  height: 8px;
  background: #EDE8FD;
  border-radius: 4px;
  overflow: hidden;
}

.score-dim .dim-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s ease;
}

.btn-retry {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 16px;
  background: #F8F9FE;
  color: var(--primary);
  border: 2px solid #EDE8FD;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-retry:active {
  background: #EDE8FD;
}

.btn-share {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 16px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(108,92,231,0.3);
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}

/* ====== SHARE MODAL ====== */
.share-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  justify-content: center;
  align-items: center;
  padding: 24px;
}

.share-overlay.show {
  display: flex;
}

.share-modal {
  background: #fff;
  border-radius: var(--radius);
  padding: 28px 24px;
  text-align: center;
  width: 100%;
  max-width: 320px;
  animation: fadeIn 0.3s ease;
}

.share-modal h3 {
  font-size: 18px;
  margin-bottom: 8px;
}

.share-modal .share-url {
  background: #F8F9FE;
  padding: 12px;
  border-radius: 12px;
  font-size: 12px;
  color: var(--text-light);
  word-break: break-all;
  margin: 16px 0;
}

.btn-copy {
  padding: 12px 32px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.btn-close {
  display: block;
  margin: 12px auto 0;
  padding: 8px 16px;
  background: none;
  border: none;
  color: var(--text-light);
  font-size: 14px;
  cursor: pointer;
}

/* ====== Loading spinner (shown during result calc) ====== */
.loading {
  display: none;
  text-align: center;
  padding: 60px 24px;
  animation: fadeIn 0.3s ease;
}

.loading.active {
  display: block;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid #EDE8FD;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}

.loading-text {
  font-size: 15px;
  color: var(--text-light);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<div class="container">

      <span>📝 <span data-question-count>10</span>道题</span>
      <span>⏱ <span id="timeEstimate">约2分钟</span></span>
    </div>
    <button class="btn-start" onclick="startQuiz()">开始测试</button>
  </div>

  <!-- ========== QUIZ ========== -->
  <div class="quiz" id="quizPage">
    <div class="progress-wrap">
      <div class="progress-text">
        <span>测试进度</span>
        <span id="progressLabel">1/10</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="question-card">
      <div class="question-num" id="questionNum">第 1 题</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()" disabled>下一题</button>
  </div>

  <!-- ========== LOADING ========== -->
  <div class="loading" id="loadingPage">
    <div class="spinner"></div>
    <p class="loading-text">正在生成你的专属报告...</p>
  </div>

  <!-- ========== RESULT ========== -->
  <div class="result" id="resultPage">
    <div class="result-card">
      <div class="result-type" id="resultType"></div>
      <h2 id="resultTitle"></h2>
      <div class="traits" id="resultTraits"></div>
      <div id="resultDimensions"></div>
      <div class="report" id="resultReport"></div>
      <button class="btn-share" onclick="showShare()">📤 分享给朋友</button>
      <button class="btn-retry" onclick="restartQuiz()">🔄 再测一次</button>
    </div>
  </div>

  <!-- ========== SHARE MODAL ========== -->
  <div class="share-overlay" id="shareOverlay" onclick="hideShare(event)">
    <div class="share-modal" onclick="event.stopPropagation()">
      <h3>分享这个测试</h3>
      <p style="font-size:13px;color:#636E72">复制链接发给朋友</p>
      <div class="share-url" id="shareUrl"></div>
      <button class="btn-copy" onclick="copyUrl()">📋 复制链接</button>
      <button class="btn-close" onclick="document.getElementById('shareOverlay').classList.remove('show')">关闭</button>
    </div>
  </div>

</div>

// ============================================================
// APP LOGIC
// ============================================================
let currentQuestion = 0;
let answers = {};
let selectedOption = null;
const isMultiMode = TEST_CONFIG.scoring.type === 'multi';

function initApp() {
  const cfg = TEST_CONFIG;
  document.querySelector('[data-icon]').textContent = cfg.icon;
  document.querySelector('[data-cover-title]').textContent = cfg.title;
  document.querySelector('[data-cover-desc]').textContent = cfg.description;
  document.querySelector('[data-question-count]').textContent = cfg.questions.length;
  // Dynamic time estimate
  const n = cfg.questions.length;
  const mins = Math.max(1, Math.round(n * (isMultiMode ? 5 : 12) / 60));
  document.getElementById('timeEstimate').textContent = `约${mins}分钟`;
  document.title = cfg.title;
  showPage('coverPage');
}

function showPage(pageId) {
  ['coverPage','quizPage','loadingPage','resultPage'].forEach(id => {
    const el = document.getElementById(id);
    if (id === 'coverPage' || id === 'resultPage') {
      el.style.display = id === pageId ? 'block' : 'none';
    } else {
      el.classList.toggle('active', id === pageId);
    }
    if (id === 'loadingPage') {
      el.classList.toggle('active', id === pageId);
    }
  });
}

function startQuiz() {
  currentQuestion = 0;
  answers = {};
  showPage('quizPage');
  renderQuestion();
}

function renderQuestion() {
  const cfg = TEST_CONFIG;
  const q = cfg.questions[currentQuestion];
  selectedOption = null;

  document.getElementById('questionNum').textContent = `第 ${currentQuestion + 1} 题`;
  document.getElementById('progressLabel').textContent = `${currentQuestion + 1}/${cfg.questions.length}`;
  document.getElementById('progressFill').style.width = `${(currentQuestion / cfg.questions.length) * 100}%`;

  // Multi mode: show center label above question
  if (isMultiMode && q.center) {
    const dim = cfg.scoring.dimensions.find(d => d.key === 'c' + q.center);
    const dimLabel = dim ? dim.label : '';
    const dimIcon = dim ? (dim.icon || '') : '';
    document.getElementById('questionNum').textContent = `${dimIcon} ${dimLabel} · 第 ${currentQuestion + 1} 题`;
  }

  document.getElementById('questionText').textContent = q.text;

  const wrap = document.getElementById('optionsWrap');

  if (isMultiMode) {
    // Multi mode: Yes/No options
    const opts = [
      {letter:'是', text:'是', score:1},
      {letter:'否', text:'否', score:0}
    ];
    wrap.innerHTML = opts.map((opt, i) => `
      <button class="option-btn" data-index="${i}" onclick="selectOption(${i}, this)">
        <span class="option-letter">${opt.letter}</span>
        <span>${opt.text}</span>
      </button>
    `).join('');

    if (answers[q.id] !== undefined) {
      const prevIdx = answers[q.id] === 1 ? 0 : 1;
      const btn = wrap.querySelector(`[data-index="${prevIdx}"]`);
      if (btn) { btn.classList.add('selected'); selectedOption = prevIdx; }
    }
  } else {
    // Simple mode: A/B/C/D options
    wrap.innerHTML = q.options.map((opt, i) => `
      <button class="option-btn" data-index="${i}" onclick="selectOption(${i}, this)">
        <span class="option-letter">${opt.letter}</span>
        <span>${opt.text}</span>
      </button>
    `).join('');

    if (answers[q.id] !== undefined) {
      const prevIdx = q.options.findIndex(o => o.score === answers[q.id]);
      if (prevIdx >= 0) {
        const btn = wrap.querySelector(`[data-index="${prevIdx}"]`);
        btn.classList.add('selected');
        selectedOption = prevIdx;
      }
    }
  }

  updateNextButton();
}

function selectOption(index, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOption = index;
  updateNextButton();
}

function updateNextButton() {
  const btn = document.getElementById('btnNext');
  if (selectedOption !== null) {
    btn.classList.add('ready');
    btn.disabled = false;
    if (currentQuestion === TEST_CONFIG.questions.length - 1) {
      btn.textContent = '查看报告 ✨';
    } else {
      btn.textContent = '下一题 →';
    }
  } else {
    btn.classList.remove('ready');
    btn.disabled = true;
  }
}

function nextQuestion() {
  if (selectedOption === null) return;
  const q = TEST_CONFIG.questions[currentQuestion];

  if (isMultiMode) {
    answers[q.id] = selectedOption === 0 ? 1 : 0;
  } else {
    answers[q.id] = q.options[selectedOption].score;
  }

  if (currentQuestion < TEST_CONFIG.questions.length - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  showPage('loadingPage');

  setTimeout(() => {
    const cfg = TEST_CONFIG;

    if (isMultiMode) {
      showMultiResults(cfg);
    } else {
      showSimpleResults(cfg);
    }

    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressLabel').textContent = `${cfg.questions.length}/${cfg.questions.length}`;
    showPage('resultPage');
  }, 1500);
}

function showMultiResults(cfg) {
  // Calculate per-dimension scores
  const dimScores = {};
  const dimPercents = {};
  for (const dim of cfg.scoring.dimensions) {
    const total = dim.questions.length;
    let yesCount = 0;
    for (const qid of dim.questions) {
      if (answers[qid] === 1) yesCount++;
    }
    dimScores[dim.key] = yesCount;
    dimPercents[dim.key] = Math.round((yesCount / total) * 100);
  }

  // Sort dimensions by score (highest first = most attention needed)
  const sorted = [...cfg.scoring.dimensions].sort((a,b) => dimPercents[b.key] - dimPercents[a.key]);
  const topCenter = sorted[0];
  const topDetail = cfg.scoring.centerDetails[topCenter.key];

  // Overall status
  const maxPct = dimPercents[topCenter.key];
  let overallLabel, overallColor;
  if (maxPct <= 30) { overallLabel = '你的身心状态总体良好'; overallColor = '#00B894'; }
  else if (maxPct <= 55) { overallLabel = '部分情绪中心需要关注'; overallColor = '#FDCB6E'; }
  else { overallLabel = '你的身心正在呼求你的关注'; overallColor = '#FF7675'; }

  // Render
  document.getElementById('resultType').textContent = overallLabel;
  document.getElementById('resultType').style.background = overallColor + '22';
  document.getElementById('resultType').style.color = overallColor;
  document.getElementById('resultTitle').textContent = `你最需要关注的是：${topDetail.name}`;

  // Traits = body parts affected
  document.getElementById('resultTraits').innerHTML =
    `<span class="trait-tag" style="background:#FFF5F5;color:#FF7675">⚠ 核心需求：${topDetail.coreNeed}</span>` +
    `<span class="trait-tag">身体信号：${topDetail.bodyParts}</span>`;

  // Dimension bars - all 7
  const barsHTML = cfg.scoring.dimensions.map(dim => {
    const pct = dimPercents[dim.key];
    let tierColor = '#00B894';
    if (pct > 55) tierColor = '#FF7675';
    else if (pct > 30) tierColor = '#FDCB6E';

    let tierLabel = '健康';
    if (pct > 55) tierLabel = '警觉';
    else if (pct > 30) tierLabel = '关注';

    return `
      <div class="score-dim" style="margin-bottom:8px">
        <span class="dim-label" style="width:100px;font-size:11px">${dim.icon||''} ${dim.label}</span>
        <div class="dim-bar" style="flex:1">
          <div class="dim-fill" style="width:${pct}%;background:${tierColor}"></div>
        </div>
        <span style="font-size:11px;color:#636E72;width:40px;text-align:right">${pct}%</span>
        <span style="font-size:10px;color:${tierColor};width:28px;text-align:right">${tierLabel}</span>
      </div>
    `;
  }).join('');

  document.getElementById('resultDimensions').innerHTML = `
    <div style="text-align:left;margin-bottom:20px">
      <p style="font-size:13px;color:#636E72;margin-bottom:12px">📊 七情绪中心评估总览</p>
      <div class="score-bar-wrap">${barsHTML}</div>
    </div>
    <div style="font-size:11px;color:#999;margin-bottom:16px;text-align:center">
      ⬆ 百分比越高 = 该情绪中心越需要你的关注
    </div>
  `;

  // Top center detailed report
  const detail = topDetail;
  let descText = '';
  if (dimPercents[topCenter.key] <= 30) descText = detail.healthyDesc;
  else if (dimPercents[topCenter.key] <= 55) descText = detail.warningDesc;
  else descText = detail.alertDesc;

  document.getElementById('resultReport').innerHTML = `
    <div style="margin-bottom:20px">
      <p style="font-weight:700;font-size:16px;margin-bottom:8px">🔍 ${detail.name} 深度解读</p>
      <p style="margin-bottom:8px"><strong>关联身体部位：</strong>${detail.bodyParts}</p>
      <p style="line-height:1.8">${descText}</p>
    </div>
    <div style="background:#FFF9F0;border-radius:14px;padding:16px;margin-bottom:16px;border-left:3px solid #FF7675">
      <p style="font-weight:700;font-size:14px;margin-bottom:6px">💬 疗愈肯定语</p>
      <p style="font-style:italic;line-height:1.7">${detail.healing}</p>
    </div>
    <div>
      <p style="font-weight:700;font-size:14px;margin-bottom:8px">✨ 行动建议</p>
      <ul style="padding-left:18px;line-height:2;font-size:13px">
        ${detail.tips.map(t => `<li>${t}</li>`).join('')}
      </ul>
    </div>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0">
      <p style="font-size:12px;color:#999;text-align:center">
        以上分析基于露易丝·海《一切都会好的》七情绪中心理论<br>
        所有7个中心的完整报告请查看下方
      </p>
    </div>
  `;
}

function showSimpleResults(cfg) {
  const totalScore = Object.values(answers).reduce((a,b) => a + b, 0);
  let resultType = null;
  for (const range of cfg.scoring.resultRanges) {
    if (totalScore >= range.min && totalScore <= range.max) {
      resultType = range.type;
      break;
    }
  }
  if (!resultType) resultType = cfg.scoring.resultRanges[0].type;
  const result = cfg.scoring.results[resultType];

  const dimScores = {};
  for (const dim of cfg.scoring.dimensions) {
    const relevantAnswers = dim.questions.filter(qid => answers[qid] !== undefined);
    const dimTotal = relevantAnswers.reduce((s, qid) => s + answers[qid], 0);
    const maxPossible = relevantAnswers.length * 4;
    dimScores[dim.key] = Math.round((dimTotal / maxPossible) * 100);
  }

  document.getElementById('resultType').textContent = resultType;
  document.getElementById('resultType').style.background = '#EDE8FD';
  document.getElementById('resultTitle').textContent = result.title;
  document.getElementById('resultTraits').innerHTML = result.traits.map(t =>
    `<span class="trait-tag">${t}</span>`
  ).join('');

  const dimHTML = cfg.scoring.dimensions.map(dim => {
    const score = dimScores[dim.key] || 50;
    return `
      <div class="score-dim">
        <span class="dim-label">${dim.label}</span>
        <div class="dim-bar">
          <div class="dim-fill" style="width:${score}%;background:${getDimColor(score)}"></div>
        </div>
        <span style="font-size:12px;color:#636E72">${score}%</span>
      </div>
    `;
  }).join('');
  document.getElementById('resultDimensions').innerHTML = `<div class="score-bar-wrap">${dimHTML}</div>`;
  document.getElementById('resultReport').innerHTML = result.report.replace(/\n/g, '<br>');
}

function getDimColor(score) {
  if (score >= 75) return '#00B894';
  if (score >= 50) return '#6C5CE7';
  if (score >= 30) return '#FDCB6E';
  return '#FF7675';
}

function restartQuiz() { startQuiz(); }

function showShare() {
  document.getElementById('shareUrl').textContent = window.location.href;
  document.getElementById('shareOverlay').classList.add('show');
}

function hideShare(e) {
  if (e.target === document.getElementById('shareOverlay')) {
    document.getElementById('shareOverlay').classList.remove('show');
  }
}

function copyUrl() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '📋 复制链接'; }, 2000);
  });
}

initApp();
</script>
