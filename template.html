<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title data-title>心理测试</title>
<style>
:root {
  --primary: #6C5CE7;
  --primary-light: #A29BFE;
  --bg: #F8F9FE;
  --card: #FFFFFF;
  --text: #2D3436;
  --text-light: #636E72;
  --success: #00B894;
  --danger: #FF7675;
  --shadow: 0 4px 24px rgba(108,92,231,0.08);
  --radius: 20px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
}

.container {
  width: 100%;
  max-width: 420px;
  min-height: 600px;
  position: relative;
}

/* ====== COVER PAGE ====== */
.cover {
  background: var(--card);
  border-radius: var(--radius);
  padding: 40px 28px 32px;
  text-align: center;
  box-shadow: var(--shadow);
  animation: fadeIn 0.5s ease;
}

.cover-icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin: 0 auto 24px;
  color: #fff;
}

.cover h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 12px;
  line-height: 1.3;
}

.cover .desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
  margin-bottom: 8px;
}

.cover .meta {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px 0 28px;
  font-size: 12px;
  color: var(--text-light);
}

.cover .meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.btn-start {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 24px rgba(108,92,231,0.3);
}

.btn-start:active {
  transform: scale(0.97);
}

/* ====== QUIZ PAGE ====== */
.quiz {
  display: none;
  animation: fadeIn 0.4s ease;
}

.quiz.active {
  display: block;
}

.progress-wrap {
  background: var(--card);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

.progress-text {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

.progress-bar {
  height: 6px;
  background: #EDE8FD;
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 3px;
  transition: width 0.3s ease;
}

.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px 24px 24px;
  box-shadow: var(--shadow);
}

.question-num {
  font-size: 12px;
  color: var(--primary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}

.question-text {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 24px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 14px 18px;
  background: #F8F9FE;
  border: 2px solid transparent;
  border-radius: 14px;
  font-size: 15px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.option-btn:active {
  transform: scale(0.98);
}

.option-btn.selected {
  border-color: var(--primary);
  background: #EDE8FD;
}

.option-letter {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: #E0DCF7;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: var(--primary);
  flex-shrink: 0;
}

.option-btn.selected .option-letter {
  background: var(--primary);
  color: #fff;
}

.btn-next {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  background: #D5D0F0;
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-next.ready {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  box-shadow: 0 8px 24px rgba(108,92,231,0.3);
}

.btn-next:active {
  transform: scale(0.97);
}

/* ====== RESULT PAGE ====== */
.result {
  display: none;
  animation: fadeIn 0.5s ease;
}

.result.active {
  display: block;
}

.result-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 36px 24px 28px;
  box-shadow: var(--shadow);
  text-align: center;
}

.result-type {
  display: inline-block;
  padding: 6px 20px;
  background: #EDE8FD;
  color: var(--primary);
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 20px;
}

.result h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 20px;
  line-height: 1.4;
}

.result .traits {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 24px;
}

.trait-tag {
  padding: 8px 16px;
  background: #F8F9FE;
  border-radius: 20px;
  font-size: 13px;
  color: var(--text-light);
}

.result .report {
  background: #F8F9FE;
  border-radius: 16px;
  padding: 20px;
  text-align: left;
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 24px;
}

.result .score-bar-wrap {
  text-align: left;
  margin-bottom: 20px;
}

.score-dim {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.score-dim .dim-label {
  width: 56px;
  font-size: 12px;
  color: var(--text-light);
  flex-shrink: 0;
}

.score-dim .dim-bar {
  flex: 1;
  height: 8px;
  background: #EDE8FD;
  border-radius: 4px;
  overflow: hidden;
}

.score-dim .dim-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s ease;
}

.btn-retry {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 16px;
  background: #F8F9FE;
  color: var(--primary);
  border: 2px solid #EDE8FD;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-retry:active {
  background: #EDE8FD;
}

.btn-share {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 16px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(108,92,231,0.3);
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}

/* ====== SHARE MODAL ====== */
.share-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  justify-content: center;
  align-items: center;
  padding: 24px;
}

.share-overlay.show {
  display: flex;
}

.share-modal {
  background: #fff;
  border-radius: var(--radius);
  padding: 28px 24px;
  text-align: center;
  width: 100%;
  max-width: 320px;
  animation: fadeIn 0.3s ease;
}

.share-modal h3 {
  font-size: 18px;
  margin-bottom: 8px;
}

.share-modal .share-url {
  background: #F8F9FE;
  padding: 12px;
  border-radius: 12px;
  font-size: 12px;
  color: var(--text-light);
  word-break: break-all;
  margin: 16px 0;
}

.btn-copy {
  padding: 12px 32px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.btn-close {
  display: block;
  margin: 12px auto 0;
  padding: 8px 16px;
  background: none;
  border: none;
  color: var(--text-light);
  font-size: 14px;
  cursor: pointer;
}

/* ====== Loading spinner (shown during result calc) ====== */
.loading {
  display: none;
  text-align: center;
  padding: 60px 24px;
  animation: fadeIn 0.3s ease;
}

.loading.active {
  display: block;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid #EDE8FD;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}

.loading-text {
  font-size: 15px;
  color: var(--text-light);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">

  <!-- ========== COVER ========== -->
  <div class="cover" id="coverPage">
    <div class="cover-icon" data-icon>🧠</div>
    <h1 data-cover-title>心理测试</h1>
    <p class="desc" data-cover-desc>探索你的内心世界，发现最真实的自己</p>
    <div class="meta">
      <span>📝 <span data-question-count>10</span>道题</span>
      <span>⏱ 约2分钟</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">开始测试</button>
  </div>

  <!-- ========== QUIZ ========== -->
  <div class="quiz" id="quizPage">
    <div class="progress-wrap">
      <div class="progress-text">
        <span>测试进度</span>
        <span id="progressLabel">1/10</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="question-card">
      <div class="question-num" id="questionNum">第 1 题</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()" disabled>下一题</button>
  </div>

  <!-- ========== LOADING ========== -->
  <div class="loading" id="loadingPage">
    <div class="spinner"></div>
    <p class="loading-text">正在生成你的专属报告...</p>
  </div>

  <!-- ========== RESULT ========== -->
  <div class="result" id="resultPage">
    <div class="result-card">
      <div class="result-type" id="resultType"></div>
      <h2 id="resultTitle"></h2>
      <div class="traits" id="resultTraits"></div>
      <div id="resultDimensions"></div>
      <div class="report" id="resultReport"></div>
      <button class="btn-share" onclick="showShare()">📤 分享给朋友</button>
      <button class="btn-retry" onclick="restartQuiz()">🔄 再测一次</button>
    </div>
  </div>

  <!-- ========== SHARE MODAL ========== -->
  <div class="share-overlay" id="shareOverlay" onclick="hideShare(event)">
    <div class="share-modal" onclick="event.stopPropagation()">
      <h3>分享这个测试</h3>
      <p style="font-size:13px;color:#636E72">复制链接发给朋友</p>
      <div class="share-url" id="shareUrl"></div>
      <button class="btn-copy" onclick="copyUrl()">📋 复制链接</button>
      <button class="btn-close" onclick="document.getElementById('shareOverlay').classList.remove('show')">关闭</button>
    </div>
  </div>

</div>

        "title": "你是「随性者」——活在当下的生活家",
        "traits": ["随遇而安", "真实纯粹", "享受生活", "不喜约束"],
        "report": "你是朋友圈里那个让人感到最轻松的人。不焦虑未来，不纠结过去，你擅长享受当下每一刻的美好。你不喜欢复杂的规则和冗长的计划，简单直接是你的风格。\n\n这种看似「随性」的态度，其实是一种难得的生活智慧——你懂得不为没必要的事情消耗自己。\n\n💡 小建议：偶尔为重要的事情做些准备，可以让你的生活更加从容。",
        "dimScores": {"planning": 35, "social": 45, "openness": 40}
      }
    }
  }
};

// ============================================================
// APP LOGIC
// ============================================================
let currentQuestion = 0;
let answers = {};
let selectedOption = null;

function initApp() {
  const cfg = TEST_CONFIG;
  // Set cover
  document.querySelector('[data-icon]').textContent = cfg.icon;
  document.querySelector('[data-cover-title]').textContent = cfg.title;
  document.querySelector('[data-cover-desc]').textContent = cfg.description;
  document.querySelector('[data-question-count]').textContent = cfg.questions.length;
  document.title = cfg.title;

  // Pre-load all questions into hidden state
  showPage('coverPage');
}

function showPage(pageId) {
  ['coverPage','quizPage','loadingPage','resultPage'].forEach(id => {
    const el = document.getElementById(id);
    if (id === 'coverPage' || id === 'resultPage') {
      el.style.display = id === pageId ? 'block' : 'none';
    } else {
      el.classList.toggle('active', id === pageId);
    }
    if (id === 'loadingPage') {
      el.classList.toggle('active', id === pageId);
    }
  });
}

function startQuiz() {
  currentQuestion = 0;
  answers = {};
  showPage('quizPage');
  renderQuestion();
}

function renderQuestion() {
  const cfg = TEST_CONFIG;
  const q = cfg.questions[currentQuestion];
  selectedOption = null;

  document.getElementById('questionNum').textContent = `第 ${currentQuestion + 1} 题`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressLabel').textContent = `${currentQuestion + 1}/${cfg.questions.length}`;
  document.getElementById('progressFill').style.width = `${(currentQuestion / cfg.questions.length) * 100}%`;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = q.options.map((opt, i) => `
    <button class="option-btn" data-index="${i}" onclick="selectOption(${i}, this)">
      <span class="option-letter">${opt.letter}</span>
      <span>${opt.text}</span>
    </button>
  `).join('');

  // Restore previous answer if exists
  if (answers[q.id] !== undefined) {
    const prevIdx = q.options.findIndex(o => o.score === answers[q.id]);
    if (prevIdx >= 0) {
      const btn = wrap.querySelector(`[data-index="${prevIdx}"]`);
      btn.classList.add('selected');
      selectedOption = prevIdx;
    }
  }

  updateNextButton();
}

function selectOption(index, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOption = index;
  updateNextButton();
}

function updateNextButton() {
  const btn = document.getElementById('btnNext');
  if (selectedOption !== null) {
    btn.classList.add('ready');
    btn.disabled = false;
    if (currentQuestion === TEST_CONFIG.questions.length - 1) {
      btn.textContent = '查看结果 ✨';
    } else {
      btn.textContent = '下一题 →';
    }
  } else {
    btn.classList.remove('ready');
    btn.disabled = true;
  }
}

function nextQuestion() {
  if (selectedOption === null) return;

  // Save answer
  const q = TEST_CONFIG.questions[currentQuestion];
  answers[q.id] = q.options[selectedOption].score;

  if (currentQuestion < TEST_CONFIG.questions.length - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  showPage('loadingPage');

  setTimeout(() => {
    const cfg = TEST_CONFIG;
    const totalScore = Object.values(answers).reduce((a,b) => a + b, 0);

    // Find matching result range
    let resultType = null;
    for (const range of cfg.scoring.resultRanges) {
      if (totalScore >= range.min && totalScore <= range.max) {
        resultType = range.type;
        break;
      }
    }
    if (!resultType) resultType = cfg.scoring.resultRanges[0].type;

    const result = cfg.scoring.results[resultType];

    // Calculate dimension scores
    const dimScores = {};
    for (const dim of cfg.scoring.dimensions) {
      const relevantAnswers = dim.questions.filter(qid => answers[qid] !== undefined);
      const dimTotal = relevantAnswers.reduce((s, qid) => s + answers[qid], 0);
      const maxPossible = relevantAnswers.length * 4;
      dimScores[dim.key] = Math.round((dimTotal / maxPossible) * 100);
    }

    // Render result
    document.getElementById('resultType').textContent = resultType;
    document.getElementById('resultType').style.background = '#EDE8FD';
    document.getElementById('resultTitle').textContent = result.title;

    document.getElementById('resultTraits').innerHTML = result.traits.map(t =>
      `<span class="trait-tag">${t}</span>`
    ).join('');

    // Dimension bars
    const dimHTML = cfg.scoring.dimensions.map(dim => {
      const score = dimScores[dim.key] || 50;
      return `
        <div class="score-dim">
          <span class="dim-label">${dim.label}</span>
          <div class="dim-bar">
            <div class="dim-fill" style="width:${score}%;background:${getDimColor(score)}"></div>
          </div>
          <span style="font-size:12px;color:#636E72">${score}%</span>
        </div>
      `;
    }).join('');

    document.getElementById('resultDimensions').innerHTML = `
      <div class="score-bar-wrap">${dimHTML}</div>
    `;

    document.getElementById('resultReport').innerHTML = result.report.replace(/\n/g, '<br>');

    showPage('resultPage');
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressLabel').textContent = `${cfg.questions.length}/${cfg.questions.length}`;
  }, 1200);
}

function getDimColor(score) {
  if (score >= 75) return '#00B894';
  if (score >= 50) return '#6C5CE7';
  if (score >= 30) return '#FDCB6E';
  return '#FF7675';
}

function restartQuiz() {
  startQuiz();
}

function showShare() {
  document.getElementById('shareUrl').textContent = window.location.href;
  document.getElementById('shareOverlay').classList.add('show');
}

function hideShare(e) {
  if (e.target === document.getElementById('shareOverlay')) {
    document.getElementById('shareOverlay').classList.remove('show');
  }
}

function copyUrl() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '📋 复制链接'; }, 2000);
  });
}

// Kickoff
initApp();
</script>
